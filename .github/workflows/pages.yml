# Déploiement du site Astro sur GitHub Pages.
# Build avec --site/--base passés en CLI : la config locale reste inchangée
# (npm run build continue de produire un site servable à la racine).
name: Déployer sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Node 24 imposé par GitHub à partir du 16 juin 2026 : on opte dès maintenant.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Installer les dépendances
        run: npm ci
        working-directory: site
      - name: Construire le site
        run: npx astro build --site "https://jmchantrein.github.io" --base "/site"
        working-directory: site
      # Prérequis (une fois) : Settings → Pages → Source : « GitHub Actions ».
      # Le GITHUB_TOKEN n'a pas le droit d'activer Pages lui-même.
      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
