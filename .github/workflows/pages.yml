# Déploiement du site Astro sur GitHub Pages, via la branche gh-pages.
#
# Méthode « branche » plutôt que l'API Pages : l'activation du site Pages
# par l'API exige des droits d'administration que le GITHUB_TOKEN n'a pas
# (échec « Resource not accessible by integration » des runs nº 1 à 3).
# Sur un dépôt public, la branche gh-pages est servie automatiquement ;
# au besoin : Settings → Pages → Source « Deploy from a branch » → gh-pages.
#
# Build avec --site/--base passés en CLI : la config locale reste inchangée
# (npm run build continue de produire un site servable à la racine).
name: Déployer sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Node 24 imposé par GitHub à partir du 16 juin 2026 : on opte dès maintenant.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Installer les dépendances
        run: npm ci
        working-directory: site
      - name: Construire le site
        run: npx astro build --site "https://jmchantrein.github.io" --base "/site"
        working-directory: site
      - name: Publier sur la branche gh-pages
        working-directory: site/dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # .nojekyll : sans lui, Pages (Jekyll) ignorerait le dossier _astro/.
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Déploiement du site (${GITHUB_SHA})"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
