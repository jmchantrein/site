# Déploiement du site Astro sur GitHub Pages.
# site/base vivent dans astro.config.mjs (requis par sitemap + RSS).
name: Déployer sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Node 24 imposé par GitHub à partir du 16 juin 2026 : on opte dès maintenant.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Installer les dépendances
        run: npm ci
        working-directory: site
      - name: Construire le site
        run: npm run build
        working-directory: site
      # Prérequis (une fois) : Settings → Pages → Source : « GitHub Actions ».
      # Le GITHUB_TOKEN n'a pas le droit d'activer Pages lui-même.
      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  # La publication n'est possible que depuis la branche par défaut :
  # l'environnement « github-pages » est protégé et refuse les autres branches.
  # Un lancement manuel (workflow_dispatch) sur une branche de fonctionnalité
  # valide ainsi le build sans tenter — et échouer — le déploiement.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
